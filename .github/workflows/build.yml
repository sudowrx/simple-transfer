name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            path: dist/SimpleTransferEnhanced
          - os: windows-latest
            name: windows
            path: dist/SimpleTransferEnhanced.exe
          - os: macos-latest
            name: macos
            path: dist/SimpleTransferEnhanced.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build ${{ matrix.name }}
        run: |
          pyinstaller --onefile --windowed --name SimpleTransferEnhanced simple-transfer-enhanced.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleTransferEnhanced-${{ matrix.name }}
          path: ${{ matrix.path }}

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
