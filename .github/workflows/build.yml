name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            ext: ""
            path: dist/SimpleTransferEnhanced
          - os: windows-latest
            name: windows
            ext: .exe
            path: dist/SimpleTransferEnhanced.exe
          - os: macos-latest
            name: macos
            ext: .app
            path: dist/SimpleTransferEnhanced.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build ${{ matrix.name }}
        run: |
          pyinstaller --onefile --windowed --name SimpleTransferEnhanced simple-transfer-enhanced.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleTransferEnhanced-${{ matrix.name }}
          path: ${{ matrix.path }}

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files
        run: |
          cd artifacts
          # Linux - already executable
          # Windows - already .exe
          # macOS - zip it
          if [ -d "SimpleTransferEnhanced-macos/SimpleTransferEnhanced.app" ]; then
            cd SimpleTransferEnhanced-macos
            zip -r ../SimpleTransferEnhanced-macos.zip SimpleTransferEnhanced.app
            cd ..
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SimpleTransferEnhanced-linux/SimpleTransferEnhanced
            artifacts/SimpleTransferEnhanced-windows/SimpleTransferEnhanced.exe
            artifacts/SimpleTransferEnhanced-macos.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
